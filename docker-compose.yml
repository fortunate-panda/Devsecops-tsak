version: '3.8'

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    restart: always
    volumes:
      - nextcloud_data:/var/www/html

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud

volumes:
  nextcloud_data:
  HNG-nginx-logs:
    driver: local