<!DOCTYPE html>
<html>
<head>
    <title>DevSecOps Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .card { background: #333; padding: 20px; margin: 10px; border-radius: 8px; display: inline-block; min-width: 200px; }
        .alert { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Security Monitor Dashboard</h1>
    <div class="card">
        <h3>Global RPS</h3>
        <p id="rps">0.0</p>
    </div>
    <div class="card">
        <h3>Banned IPs</h3>
        <p id="banned" class="alert">0</p>
    </div>
    <div class="card">
        <h3>Uptime</h3>
        <p id="uptime">0s</p>
    </div>

    <script>
        function updateMetrics() {
            fetch('/api/metrics')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('rps').innerText = data.rps;
                    document.getElementById('banned').innerText = data.banned_count;
                    document.getElementById('uptime').innerText = data.uptime;
                });
        }
        // Fetch every 3 seconds
        setInterval(updateMetrics, 3000);
        updateMetrics(); // Initial call
    </script>
</body>
</html>
